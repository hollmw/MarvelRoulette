<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chud Rivals – Character Roulette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & VARS ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #e31b23;
      --red-dark:   #9b0e14;
      --gold:       #f5a623;
      --dark:       #080810;
      --panel:      #10101c;
      --border:     #2a2a40;
      --v-color:    #4299e1;
      --d-color:    #f56565;
      --s-color:    #48bb78;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: #e0e0f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ───────────────────────────────────────── */
    header {
      position: relative;
      text-align: center;
      padding: 36px 16px 22px;
      background:
        radial-gradient(ellipse 60% 120% at 50% -20%, rgba(227,27,35,0.25) 0%, transparent 70%),
        linear-gradient(180deg, #120006 0%, var(--dark) 100%);
      border-bottom: 2px solid var(--red-dark);
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,0.015) 28px,
        rgba(255,255,255,0.015) 29px
      );
      pointer-events: none;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 8vw, 5rem);
      letter-spacing: 5px;
      line-height: 1;
      background: linear-gradient(160deg, #fff 0%, #e31b23 55%, #f5a623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(227,27,35,0.5));
    }

    header p {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 2px;
    }

    /* ─── LAYOUT ───────────────────────────────────────── */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ─── ROLE LEGEND ──────────────────────────────────── */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* ─── TEAM COMP GRID ───────────────────────────────── */
    .comp-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 40px;
    }

    .comp-btn {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, transform 0.12s;
      text-align: left;
      min-width: 110px;
    }

    .comp-btn:hover {
      border-color: rgba(227,27,35,0.6);
      transform: translateY(-1px);
    }

    .comp-btn.active {
      border-color: var(--red);
      background: rgba(227,27,35,0.12);
    }

    .comp-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }

    .comp-pips {
      display: flex;
      gap: 3px;
      margin-top: 7px;
      flex-wrap: wrap;
    }

    .pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .pip-v { background: var(--v-color); }
    .pip-d { background: var(--d-color); }
    .pip-s { background: var(--s-color); }

    /* ─── PLAYER INPUTS ────────────────────────────────── */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    @media (max-width: 620px) {
      .players-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .player-field { position: relative; }

    .player-label {
      position: absolute;
      top: -9px;
      left: 12px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--gold);
      background: var(--dark);
      padding: 0 6px;
      z-index: 1;
    }

    .player-input {
      width: 100%;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 9px;
      padding: 13px 14px;
      color: #e0e0f0;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-input:focus        { border-color: var(--red); }
    .player-input::placeholder { color: #3a3a55; }

    /* ─── ROLL BUTTON ──────────────────────────────────── */
    .roll-wrap { margin-bottom: 40px; }

    .roll-btn {
      display: block;
      width: 100%;
      padding: 20px 24px;
      background: linear-gradient(135deg, #b0161d 0%, var(--red) 45%, #b0161d 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 28px rgba(227,27,35,0.35);
    }

    .roll-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .roll-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(227,27,35,0.55);
    }

    .roll-btn:active:not(:disabled) { transform: translateY(0); }

    .roll-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── RESULTS GRID ─────────────────────────────────── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 620px) {
      .results-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ─── RESULT CARD ──────────────────────────────────── */
    .result-card {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 14px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 20px 14px;
      text-align: center;
      transition: border-color 0.35s, background 0.35s;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      transition: background 0.35s;
    }

    .result-card.role-vanguard {
      border-color: var(--v-color);
      background: linear-gradient(160deg, var(--panel) 50%, rgba(66,153,225,0.07));
    }
    .result-card.role-vanguard::before   { background: var(--v-color); }

    .result-card.role-duelist {
      border-color: var(--d-color);
      background: linear-gradient(160deg, var(--panel) 50%, rgba(245,101,101,0.07));
    }
    .result-card.role-duelist::before    { background: var(--d-color); }

    .result-card.role-strategist {
      border-color: var(--s-color);
      background: linear-gradient(160deg, var(--panel) 50%, rgba(72,187,120,0.07));
    }
    .result-card.role-strategist::before { background: var(--s-color); }

    .card-player-name {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }

    .card-role-tag {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 99px;
    }

    .tag-vanguard   { background: rgba(66,153,225,0.18);  color: #63b3ed; }
    .tag-duelist    { background: rgba(245,101,101,0.18); color: #fc8181; }
    .tag-strategist { background: rgba(72,187,120,0.18);  color: #68d391; }

    .card-character {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.55rem;
      letter-spacing: 1px;
      line-height: 1.15;
      color: #f0f0ff;
    }

    .card-placeholder { color: #2e2e4a; font-size: 0.8rem; letter-spacing: 1px; }

    .card-character.is-spinning {
      color: #555;
      animation: flicker 0.07s steps(1) infinite;
    }

    @keyframes flicker {
      0%   { opacity: 0.3; }
      50%  { opacity: 1;   }
      100% { opacity: 0.3; }
    }

    @keyframes pop-in {
      0%   { transform: scale(0.93); opacity: 0.5; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1);   opacity: 1;   }
    }

    .result-card.revealed {
      animation: pop-in 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ─── HOVER REROLL OVERLAY ─────────────────────────── */
    .reroll-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 14, 0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.18s;
      border-radius: 12px;
    }

    .result-card.has-result:hover .reroll-overlay { opacity: 1; }

    .reroll-icon { font-size: 1.5rem; line-height: 1; }

    .reroll-btn {
      background: transparent;
      border: 1.5px solid rgba(227,27,35,0.7);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 2.5px;
      padding: 7px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .reroll-btn:hover {
      background: rgba(227,27,35,0.35);
      border-color: var(--red);
    }

    /* ─── FOOTER ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════ -->
<header>
  <h1>CHUD RIVALS</h1>
  <p>CHARACTER ROULETTE</p>
</header>

<!-- ══ MAIN ════════════════════════════════════════════════════ -->
<main>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item">
      <span class="legend-dot" style="background:var(--v-color)"></span>
      <span style="color:var(--v-color)">VANGUARD</span>
      <span style="color:#555;font-size:0.7rem">(Tank)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:var(--d-color)"></span>
      <span style="color:var(--d-color)">DUELIST</span>
      <span style="color:#555;font-size:0.7rem">(DPS)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:var(--s-color)"></span>
      <span style="color:var(--s-color)">STRATEGIST</span>
      <span style="color:#555;font-size:0.7rem">(Support)</span>
    </div>
  </div>

  <!-- TEAM COMP -->
  <div class="section-title">TEAM COMPOSITION</div>
  <div class="comp-grid" id="compGrid"></div>

  <!-- PLAYERS -->
  <div class="section-title">PLAYERS</div>
  <div class="players-grid" id="playersGrid"></div>

  <!-- ROLL -->
  <div class="roll-wrap">
    <button class="roll-btn" id="rollBtn">🎲 SPIN THE WHEEL</button>
  </div>

  <!-- RESULTS -->
  <div class="section-title">RESULTS</div>
  <div class="results-grid" id="resultsGrid"></div>

</main>

<footer>Fan-made tool · Not affiliated with Marvel or NetEase</footer>

<!-- ══ SCRIPT ══════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── CHARACTER POOLS ──────────────────────────────────────────────
   Season 8 roster. Deadpool excluded (multi-role hero).
   S6:   Elsa Bloodstone (Duelist)
   S7:   White Fox (Strategist)
   S7.5: Black Cat (Duelist)
   S8:   Devil Dinosaur (Vanguard)
   S8.5: Cyclops (Duelist) — not yet released
─────────────────────────────────────────────────────────────────── */
const CHARS = {
  vanguard: [
    'Angela', 'Captain America', 'Doctor Strange', 'Emma Frost',
    'Groot', 'Hulk', 'Magneto', 'Peni Parker',
    'Rogue', 'The Thing', 'Thor', 'Venom',
    'Devil Dinosaur', 'Tank Pool'
  ],
  duelist: [
    'Black Panther', 'Black Widow', 'Blade', 'Daredevil',
    'Hawkeye', 'Hela', 'Human Torch', 'Iron Fist',
    'Iron Man', 'Magik', 'Mister Fantastic', 'Moon Knight',
    'Namor', 'Phoenix', 'Psylocke', 'Scarlet Witch',
    'Spider-Man', 'Squirrel Girl', 'Star-Lord', 'Storm',
    'The Punisher', 'Winter Soldier', 'Wolverine',
    'Elsa Bloodstone', 'Black Cat', 'DPS Pool'
  ],
  strategist: [
    'Adam Warlock', 'Cloak & Dagger', 'Gambit', 'Invisible Woman',
    'Jeff', 'Loki', 'Luna Snow', 'Mantis',
    'Rocket', 'Ultron', 'White Fox', 'Strat Pool'
  ]
};

// Special characters — at most ONE of these may appear per roll
const POOL_CHARS = new Set(['Tank Pool', 'DPS Pool', 'Strat Pool']);

/* ── TEAM COMP PRESETS ───────────────────────────────────────────
   Format: { v: vanguards, d: duelists, s: strategists } — sum = 6
─────────────────────────────────────────────────────────────────── */
const COMPS = [
  { label: '2-2-2', v:2, d:2, s:2 },
  { label: '1-3-2', v:1, d:3, s:2 },
  { label: '2-1-3', v:2, d:1, s:3 },
  { label: '3-1-2', v:3, d:1, s:2 },
  { label: '0-4-2', v:0, d:4, s:2 },
  { label: '1-2-3', v:1, d:2, s:3 },
];

let selectedComp = 0;

/* ── BUILD COMP BUTTONS ──────────────────────────────────────── */
const compGrid = document.getElementById('compGrid');

COMPS.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.className = 'comp-btn' + (i === 0 ? ' active' : '');

  const vPips = Array(c.v).fill('<span class="pip pip-v"></span>').join('');
  const dPips = Array(c.d).fill('<span class="pip pip-d"></span>').join('');
  const sPips = Array(c.s).fill('<span class="pip pip-s"></span>').join('');

  btn.innerHTML = `
    <div class="comp-num">${c.label}</div>
    <div class="comp-pips">${vPips}${dPips}${sPips}</div>
  `;

  btn.addEventListener('click', () => {
    document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedComp = i;
  });

  compGrid.appendChild(btn);
});

/* ── BUILD PLAYER INPUTS ─────────────────────────────────────── */
const playersGrid = document.getElementById('playersGrid');

for (let i = 1; i <= 6; i++) {
  const wrap = document.createElement('div');
  wrap.className = 'player-field';
  wrap.innerHTML = `
    <span class="player-label">PLAYER ${i}</span>
    <input class="player-input" id="p${i}" type="text"
           placeholder="Enter name…" maxlength="20"
           autocomplete="off" spellcheck="false" />
  `;
  playersGrid.appendChild(wrap);
}

/* ── BUILD RESULT CARDS ──────────────────────────────────────── */
const resultsGrid = document.getElementById('resultsGrid');

for (let i = 1; i <= 6; i++) {
  const card = document.createElement('div');
  card.className = 'result-card';
  card.id = `card${i}`;
  card.innerHTML = `<span class="card-placeholder">— awaiting roll —</span>`;
  resultsGrid.appendChild(card);
}

/* ── UTILITIES ───────────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getPlayerName(i) {
  const v = document.getElementById(`p${i}`).value.trim();
  return v || `Player ${i}`;
}

// Flat pool used only for the spin flicker animation
const ALL_CHARS = [...CHARS.vanguard, ...CHARS.duelist, ...CHARS.strategist];

/* ── STATE ───────────────────────────────────────────────────── */
// Per-slot tracking: role label and character currently shown
const slotState = Array.from({ length: 6 }, () => ({ role: '', character: '' }));

const roleInfo = {
  vanguard:   { label: 'VANGUARD',   tagClass: 'tag-vanguard',   cardClass: 'role-vanguard'   },
  duelist:    { label: 'DUELIST',    tagClass: 'tag-duelist',    cardClass: 'role-duelist'    },
  strategist: { label: 'STRATEGIST', tagClass: 'tag-strategist', cardClass: 'role-strategist' },
};

/* ── REVEAL HELPER ───────────────────────────────────────────── */
function revealCard(num, role, character, name) {
  const info = roleInfo[role];
  const card = document.getElementById(`card${num}`);
  slotState[num - 1] = { role, character };
  card.className = `result-card ${info.cardClass} has-result revealed`;
  card.innerHTML = `
    <div class="card-player-name">${name}</div>
    <div class="card-role-tag ${info.tagClass}">${info.label}</div>
    <div class="card-character">${character}</div>
    <div class="reroll-overlay">
      <div class="reroll-icon">🔄</div>
      <button class="reroll-btn" onclick="singleReroll(${num})">REROLL</button>
    </div>
  `;
}

/* ── SINGLE-CARD REROLL ──────────────────────────────────────── */
// Rerolls the character for one slot, keeping their assigned role.
// Avoids characters already showing on other cards (same role).
function singleReroll(num) {
  const { role } = slotState[num - 1];
  if (!role) return;

  const pool = CHARS[role];
  const name = getPlayerName(num);
  const card = document.getElementById(`card${num}`);

  // Chars already in use by other slots with the same role
  const usedByOthers = slotState
    .filter((s, i) => i !== num - 1 && s.role === role)
    .map(s => s.character);

  // If any OTHER card already shows a Pool character, exclude Pool chars from this roll
  const otherHasPoolChar = slotState.some((s, i) => i !== num - 1 && POOL_CHARS.has(s.character));

  let available = pool.filter(c => !usedByOthers.includes(c));
  if (otherHasPoolChar) available = available.filter(c => !POOL_CHARS.has(c));
  const candidate = available.length > 0 ? pickRandom(available) : pickRandom(
    otherHasPoolChar ? pool.filter(c => !POOL_CHARS.has(c)) : pool
  );

  // Mini spin
  card.className = 'result-card';
  card.innerHTML = `
    <div class="card-player-name">${name}</div>
    <div class="card-character is-spinning" id="spin${num}">???</div>
  `;

  const interval = setInterval(() => {
    const el = document.getElementById(`spin${num}`);
    if (el) el.textContent = pickRandom(pool);
  }, 75);

  setTimeout(() => {
    clearInterval(interval);
    revealCard(num, role, candidate, name);
  }, 600);
}

/* ── FULL ROLL ───────────────────────────────────────────────── */
const rollBtn = document.getElementById('rollBtn');

rollBtn.addEventListener('click', () => {
  rollBtn.disabled = true;
  rollBtn.textContent = '⏳ SPINNING…';

  const comp = COMPS[selectedComp];

  // Build shuffled role list for the 6 slots
  let roles = [
    ...Array(comp.v).fill('vanguard'),
    ...Array(comp.d).fill('duelist'),
    ...Array(comp.s).fill('strategist'),
  ];
  roles = shuffle(roles);

  // Pick unique characters per role pool
  const usedChars = { vanguard: new Set(), duelist: new Set(), strategist: new Set() };

  const results = roles.map(role => {
    const pool      = CHARS[role];
    const available = pool.filter(c => !usedChars[role].has(c));
    const character = available.length > 0 ? pickRandom(available) : pickRandom(pool);
    usedChars[role].add(character);
    return { role, character };
  });

  // Enforce: at most ONE Pool character (Tank Pool / DPS Pool / Strat Pool) per roll.
  // Keep the first one found; replace any extras with a normal character from their role.
  let poolCharSeen = false;
  results.forEach((res, idx) => {
    if (!POOL_CHARS.has(res.character)) return;
    if (!poolCharSeen) { poolCharSeen = true; return; } // keep the first
    // Replace this extra Pool char with a non-Pool character from the same role
    const fallback = CHARS[res.role].filter(
      c => !POOL_CHARS.has(c) && !usedChars[res.role].has(c)
    );
    const replacement = fallback.length > 0
      ? pickRandom(fallback)
      : pickRandom(CHARS[res.role].filter(c => !POOL_CHARS.has(c)));
    usedChars[res.role].delete(res.character);
    usedChars[res.role].add(replacement);
    results[idx].character = replacement;
  });

  const SPIN_DURATION = 1200;
  const TICK = 75;

  results.forEach(({ role, character }, idx) => {
    const num  = idx + 1;
    const name = getPlayerName(num);
    const card = document.getElementById(`card${num}`);

    // Clear previous result state
    slotState[idx] = { role: '', character: '' };
    card.className = 'result-card';
    card.innerHTML = `
      <div class="card-player-name">${name}</div>
      <div class="card-character is-spinning" id="spin${num}">???</div>
    `;

    const interval = setInterval(() => {
      const el = document.getElementById(`spin${num}`);
      if (el) el.textContent = pickRandom(ALL_CHARS);
    }, TICK);

    setTimeout(() => {
      clearInterval(interval);
      revealCard(num, role, character, name);
      if (num === 6) {
        setTimeout(() => {
          rollBtn.disabled = false;
          rollBtn.textContent = '🎲 REROLL';
        }, 300);
      }
    }, SPIN_DURATION);
  });
});
</script>
